<!doctype html>
<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  NỘI THẤT ĐẠI THIÊN — WEB BÁN LẺ + QUẢN LÝ (gộp tất cả 1 file)     ║
  ║  590 Thiên Lôi, An Biên, Hải Phòng                                 ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║  GỒM 2 KHU:                                                        ║
  ║   • CỬA HÀNG (khách): catalogue, lọc danh mục, giỏ hàng, đặt hàng  ║
  ║     (VietQR + Zalo). Không cần đăng nhập.                          ║
  ║   • QUẢN TRỊ (nhân viên): đăng nhập theo tài khoản + PIN, hiện      ║
  ║     chức năng theo PHÂN QUYỀN. Gồm: Bán hàng · Kho · Nhập · Xuất ·  ║
  ║     Báo cáo · In tag/QR · Nhân viên · Cài đặt.                     ║
  ║                                                                    ║
  ║  GIAI ĐOẠN 1 (bản này): dữ liệu lưu trong trình duyệt (1 máy).      ║
  ║   Có Sao lưu/Khôi phục .json. Tài khoản chủ mặc định PIN: 0000.     ║
  ║  GIAI ĐOẠN 2: thay lớp lưu trữ sang Supabase để nhiều máy dùng chung║
  ║   (code đã tách sẵn ở đối tượng DB để dễ thay).                    ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nội Thất Đại Thiên</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* Bảng "Warm Minimalist" — Nội Thất Đại Thiên */
    --terra:#C89F82;                                   /* đất nung nhạt (trang trí) */
    --orange:#D2661F;--orange-d:#B5531A;--orange-l:#F7E6D8; /* CAM signature (nút/điểm nhấn) */
    --sage:#A3B18A;--sage-d:#7E8C66;                   /* xanh sage (phụ trợ) */
    --ink:#2E342B;--ink2:#3D453A;--muted:#8C857A;      /* xanh than (chữ/header/footer) */
    --green:#366336;
    --line:#E8E0D4;--line2:#D9CFBF;--bg:#F5EFE6;--panel:#FFFFFF;--cream:#FAF5EC;--cotton:#F8F8F8;
    --ok:#4F7A4F;--warn:#B6791F;--sale:#B23A2A;--gold:#9AA87E;--gold-d:#7E8C66;--zalo:#0068FF;
    --ui:'Be Vietnam Pro',system-ui,sans-serif;--disp:'Montserrat',system-ui,sans-serif;
    --r:9px;--r-sm:6px;--shadow:0 1px 2px rgba(46,52,43,.05),0 16px 38px rgba(46,52,43,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--ui);font-size:14px;line-height:1.5}
  button,input,select,textarea{font-family:inherit;font-size:14px}
  a{color:inherit}
  h2{font-family:var(--disp);font-size:20px;margin:0 0 14px}
  h3{margin:0 0 12px;font-size:15px}

  /* ---------- APP BAR (gộp topbar + subnav thành 1 khối sticky) ---------- */
  .appbar{position:sticky;top:0;z-index:40}
  .topbar{background:var(--ink);color:#fff;border-bottom:1px solid rgba(163,177,138,.45)}
  .topbar .in{max-width:1200px;margin:0 auto;padding:13px 20px;display:flex;align-items:center;gap:16px}
  .brand{display:flex;align-items:center;gap:13px;cursor:pointer;flex:none;min-width:0}
  .blogo{width:44px;height:44px;border-radius:8px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:.02em;color:#fff;flex:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18),0 4px 14px rgba(210,102,31,.34)}
  .bnames{min-width:0;display:flex;flex-direction:column}
  .bnames b{font-family:var(--disp);font-size:18px;font-weight:700;line-height:1.12;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bnames .sub{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .spacer{flex:1}
  .rightnav{display:flex;align-items:center;gap:12px;flex:none}
  .areas{display:flex;gap:3px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:4px}
  .area{border:0;background:transparent;color:#CFC5BA;padding:9px 17px;border-radius:5px;font-weight:600;cursor:pointer;font-size:12.5px;letter-spacing:.02em;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;transition:.15s}
  .area:hover{color:#fff}
  .area[aria-pressed="true"]{background:var(--orange);color:#fff}
  .topact{display:flex;gap:8px;align-items:center}
  .topact button,.topact a{border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);color:#fff;border-radius:9px;padding:9px 13px;font-weight:600;cursor:pointer;font-size:12.5px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .topact button:hover,.topact a:hover{background:rgba(255,255,255,.16)}
  .topact #btnCart{background:var(--orange);border-color:var(--orange);font-weight:700;padding:9px 16px}
  .topact #btnCart:hover{background:var(--orange-d)}
  .userchip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border-radius:22px;padding:5px 7px 5px 13px;font-size:12.5px;font-weight:600}
  .userchip .av{width:27px;height:27px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px}

  /* sub nav (admin tabs) */
  .subnav{background:var(--cream);border-bottom:1px solid var(--line)}
  .subnav .in{max-width:1200px;margin:0 auto;padding:6px 20px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
  .tab{border:0;background:transparent;padding:9px 15px;border-radius:9px;font-weight:600;color:var(--muted);cursor:pointer;font-size:13.5px}
  .tab[aria-pressed="true"]{background:var(--ink);color:#fff}
  .tab:hover{color:var(--ink)}

  /* phần tử chỉ hiện trên điện thoại — mặc định ẩn */
  .hamb,.micon,.msearch{display:none}
  .drawer-ov{position:fixed;inset:0;background:rgba(20,16,12,.5);z-index:55;opacity:0;pointer-events:none;transition:.2s}
  .drawer-ov.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;left:0;bottom:0;width:82%;max-width:330px;background:#fff;z-index:56;transform:translateX(-100%);transition:transform .25s;overflow-y:auto;box-shadow:0 0 40px rgba(0,0,0,.2)}
  .drawer.show{transform:none}
  .drawer-body{padding:0}
  .dw-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--line)}
  .dw-head .blogo{width:34px;height:34px;font-size:13px;border-radius:8px}
  .dw-head .x{border:0;background:rgba(0,0,0,.05);width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;flex:none}
  .dw-sect{padding:8px 0;border-bottom:1px solid var(--line)}
  .dw-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:8px 18px 4px}
  .dw-sect button,.dw-sect a{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:0;background:none;padding:11px 18px;font-size:14.5px;font-weight:600;color:var(--ink);cursor:pointer;text-decoration:none}
  .dw-sect button:hover,.dw-sect a:hover{background:var(--cream)}
  .dw-sect svg.ico{color:var(--orange-d);flex:none}

  @media (max-width:760px){
    .topbar .in{flex-wrap:wrap;gap:11px}
    .bnames b{font-size:16px}
    .rightnav{order:3;width:100%;justify-content:space-between}
  }
  /* ===== ĐẦU TRANG KIỂU MOHO TRÊN ĐIỆN THOẠI ===== */
  @media (max-width:640px){
    .hamb{display:flex;align-items:center;justify-content:center;background:none;border:0;color:#fff;padding:4px;cursor:pointer;flex:none}
    .topbar .in{flex-wrap:nowrap;gap:10px;padding:10px 14px;align-items:center;justify-content:space-between}
    .brand{position:absolute;left:50%;transform:translateX(-50%);gap:8px;max-width:62%;overflow:hidden}
    .blogo{width:36px;height:36px;font-size:14px;border-radius:9px}
    #brandLogo{height:32px}
    .bnames b{font-size:15px}.bnames .sub{display:none}
    .spacer{display:none}
    .rightnav{order:0;width:auto;gap:6px;align-items:center}
    .areas{display:none}
    .micon{display:flex;align-items:center;justify-content:center;background:none;border:0;color:#fff;padding:5px;cursor:pointer}
    .topact #btnCart{padding:6px;min-width:0}
    .topact #btnCart .cbadge{position:absolute;top:-4px;right:-4px;margin:0}
    .topact #btnCart span:not(.cbadge){display:none} /* ẩn chữ "Giỏ", chỉ icon */
    .topact{gap:4px}
    .topact button,.topact a{border:0;background:none;padding:5px}
    .userchip .av{margin:0}
    body.shopping .msearch{display:block;background:#fff;border-bottom:1px solid var(--line)}
    .msearch .in{max-width:1200px;margin:0 auto;padding:9px 14px;display:flex;align-items:center;gap:9px;color:var(--muted)}
    .msearch input{flex:1;border:1px solid var(--line2);border-radius:9px;padding:10px 12px;font-size:14px;background:var(--cream);outline:none}
    .searchbar{display:none} /* ẩn ô tìm trong trang vì đã có ở header */
  }
  @media (max-width:430px){.bnames{display:none}} /* màn nhỏ: chỉ logo ở giữa */

  .wrap{max-width:1200px;margin:0 auto;padding:22px 18px 70px}

  /* ---------- CARDS / FORM ---------- */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}
  label{display:block;font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);margin:0 0 5px}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line2);border-radius:9px;background:#fff}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--orange);outline-offset:-1px;border-color:var(--orange)}
  textarea{resize:vertical;min-height:54px}
  .row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1;min-width:90px}
  .grid2{display:grid;grid-template-columns:1.25fr 1fr;gap:18px;align-items:start}
  .btn{border:1px solid var(--orange);background:var(--orange);color:#fff;border-radius:10px;padding:11px 14px;font-weight:700;cursor:pointer;width:100%}
  .btn:hover{background:var(--orange-d);border-color:var(--orange-d)}
  .btn.alt{background:#fff;color:var(--ink);border-color:var(--line2)}
  .btn.alt:hover{background:var(--cream)}
  .btn.dark{background:var(--ink);border-color:var(--ink)}
  .btn.sm{width:auto;padding:7px 12px;font-size:12.5px}
  .btn.danger{background:#fff;color:var(--sale);border-color:var(--sale)}
  .btn.danger:hover{background:#FBEEEC}

  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);font-size:13.5px}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tr.low td{background:#FBEFEC}
  .right{text-align:right}.muted{color:var(--muted)}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
  .pill.ban{background:#E9F0F8;color:var(--zalo)}.pill.nhap{background:#EAF3EE;color:var(--ok)}.pill.xuat{background:var(--orange-l);color:var(--orange-d)}
  .pill.cho{background:#FFF3D9;color:var(--warn)}.pill.xong{background:#EAF3EE;color:var(--ok)}.pill.huy{background:#F4E3E0;color:var(--sale)}
  .line-item{display:grid;grid-template-columns:1fr 60px 110px 28px;gap:8px;align-items:center;padding:7px 0;border-bottom:1px dotted var(--line)}
  .line-item .x{border:0;background:none;color:var(--sale);font-weight:800;cursor:pointer;font-size:16px}
  .tot{display:flex;justify-content:space-between;font-weight:800;font-size:18px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
  .stat{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  .stat .c{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;box-shadow:var(--shadow)}
  .stat .c.accent{background:linear-gradient(135deg,var(--orange),var(--orange-d));color:#fff;border:0}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:700}
  .stat .c.accent .l{color:rgba(255,255,255,.85)}
  .stat .v{font-size:20px;font-weight:800;margin-top:3px;font-variant-numeric:tabular-nums}
  .empty{padding:34px;text-align:center;color:var(--muted);border:1.5px dashed var(--line2);border-radius:var(--r)}
  .filterbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .chip{border:1px solid var(--line2);background:#fff;border-radius:20px;padding:6px 13px;font-weight:600;font-size:12.5px;cursor:pointer;color:var(--muted)}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .sectitle{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px}

  /* ---------- CỬA HÀNG (khách) — phong cách hiện đại ---------- */
  body.shopping{background:#F5EFE6}
  svg.ico{display:inline-block;vertical-align:-.16em;flex:none}
  .trust .t .ic svg.ico,.sechead h2 svg.ico{color:var(--gold)}
  .catcard .ic svg.ico{color:var(--ink)}
  .thumb svg.ico{color:#C3B4A2}
  .annbar{background:var(--ink);color:#E7DACB;font-size:12px;letter-spacing:.04em;display:none}
  body.shopping .annbar{display:block}
  .annbar .in{max-width:1200px;margin:0 auto;padding:7px 20px;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;text-align:center}
  .annbar b{color:var(--orange)}

  .hero{position:relative;border-radius:14px;overflow:hidden;background:radial-gradient(125% 150% at 82% 8%,#3F4937 0%,#2A3026 52%,#222820 100%);color:#fff;padding:54px;margin:4px 0 36px;min-height:360px;display:flex;flex-direction:column;border:1px solid rgba(163,177,138,.25)}
  .hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;transform-origin:center}
  .herofull{border-radius:14px;overflow:hidden;margin:4px 0 36px;display:block}
  .herofull img,.herofull picture{width:100%;height:auto;display:block}
  .hero:not(.has-img)::before{content:"";position:absolute;inset:0;z-index:1;background:linear-gradient(95deg,rgba(210,102,31,.22),transparent 58%);pointer-events:none}
  .hero::after{content:"";position:absolute;right:-70px;bottom:-90px;width:320px;height:320px;border:1px solid rgba(163,177,138,.22);border-radius:50%;box-shadow:0 0 0 30px rgba(163,177,138,.06);z-index:1}
  .hero.has-img::after{display:none}
  .hero-inner{position:relative;z-index:2;display:flex;flex-direction:column;max-width:620px;width:100%}
  .hero.v-top{justify-content:flex-start}.hero.v-center{justify-content:center}.hero.v-bottom{justify-content:flex-end}
  .hero.h-left{align-items:flex-start}.hero.h-left .hero-inner{text-align:left;align-items:flex-start}
  .hero.h-center{align-items:center}.hero.h-center .hero-inner{text-align:center;align-items:center}
  .hero.h-right{align-items:flex-end}.hero.h-right .hero-inner{text-align:right;align-items:flex-end}
  .hero.has-img .hero-inner .eyebrow,.hero.has-img .hero-inner h1,.hero.has-img .hero-inner p{text-shadow:0 1px 3px rgba(0,0,0,.55),0 2px 22px rgba(0,0,0,.5)}
  .trustedit{display:grid;grid-template-columns:60px 1fr 1fr;gap:8px;align-items:center;margin-bottom:8px}
  .hero .eyebrow{font-size:11px;letter-spacing:.36em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:16px}
  .hero.has-img .eyebrow{color:#EBDFCF}
  .hero h1{font-family:var(--disp);font-size:43px;line-height:1.07;margin:0 0 16px;max-width:660px;font-weight:700;letter-spacing:-.012em}
  .hero p{font-size:15.5px;line-height:1.72;color:#D7CABB;max-width:498px;margin:0 0 26px}
  .hero.has-img p{color:#F0EAE0}
  .hbtns{display:flex;gap:12px;flex-wrap:wrap}
  .hbtn{background:var(--orange);color:#fff;border:1px solid var(--orange);border-radius:var(--r-sm);padding:14px 28px;font-weight:600;font-size:13.5px;letter-spacing:.02em;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:.18s}
  .hbtn:hover{background:#fff;color:var(--ink);border-color:#fff}
  .hbtn.ghost{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff}
  .hbtn.ghost:hover{background:transparent;border-color:var(--gold);color:var(--gold)}

  .trust{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin-bottom:42px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .trust .t{display:flex;align-items:center;gap:13px;background:#fff;padding:18px 20px}
  .trust .t .ic{display:flex;align-items:center;flex:none}
  .trust .t b{display:block;font-size:13px;font-weight:700}
  .trust .t .d{font-size:11.5px;color:var(--muted);margin-top:1px}

  .catnav{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:50px}
  .catcard{border:1px solid var(--line);border-radius:10px;padding:22px 16px;text-align:center;cursor:pointer;background:#fff;transition:.18s}
  .catcard:hover{border-color:var(--gold);box-shadow:var(--shadow);transform:translateY(-3px)}
  .catcard:hover .nm{color:var(--gold-d)}
  .catcard .nm{font-family:var(--disp);font-weight:600;font-size:16px;line-height:1.3;transition:.15s}
  .catcard .ct{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:7px}

  .sec{margin-bottom:50px}
  .sechead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;gap:12px;border-bottom:1px solid var(--line);padding-bottom:14px}
  .sechead h2{font-family:var(--disp);font-size:28px;font-weight:700;letter-spacing:-.01em;margin:0;display:flex;align-items:center;gap:13px}
  .sechead h2 .bar{width:3px;height:24px;border-radius:0;background:var(--gold);display:inline-block}
  .sechead .muted{font-size:12px;letter-spacing:.04em}

  .searchbar{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line2);border-radius:8px;padding:13px 17px;margin-bottom:20px;max-width:580px}
  .searchbar input{border:0;outline:0;padding:0;font-size:14.5px;width:100%;background:none}
  .catchips{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:22px}
  .catchip{border:1px solid var(--line2);background:#fff;border-radius:6px;padding:9px 17px;font-weight:600;font-size:12.5px;cursor:pointer;color:var(--ink);transition:.15s}
  .catchip:hover{border-color:var(--gold)}
  .catchip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:24px}
  .pcard{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s,border-color .18s}
  .pcard:hover{transform:translateY(-4px);box-shadow:0 6px 12px rgba(21,16,12,.05),0 24px 46px rgba(21,16,12,.12);border-color:var(--line2)}
  .thumb{position:relative;aspect-ratio:1/1;background:#F4EFE8;display:flex;align-items:center;justify-content:center;color:#CBBDAC;cursor:pointer;overflow:hidden;font-size:54px}
  .thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
  .pcard:hover .thumb img{transform:scale(1.05)}
  .disc{position:absolute;top:11px;left:11px;background:var(--orange);color:#fff;font-size:11px;font-weight:700;letter-spacing:.04em;padding:5px 9px;border-radius:4px}
  .soldout{position:absolute;inset:0;background:rgba(250,246,239,.7);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink);letter-spacing:.08em;text-transform:uppercase;font-size:13px}
  .pbody{padding:15px 16px 17px;display:flex;flex-direction:column;flex:1}
  .pcat{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-d);font-weight:700}

<script>
/* ====================== HÀM CHUNG ====================== */
const $=s=>document.querySelector(s);
const fmt=n=>new Intl.NumberFormat('vi-VN').format(Math.round(n||0))+'đ';
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const num=v=>{const n=parseInt(String(v).replace(/[^\d]/g,''),10);return isNaN(n)?0:n;};
const initials=s=>((s||'?').trim().split(/\s+/)[0]||'?').slice(0,1).toUpperCase();
const brandMark=s=>{const w=(s||'').trim().split(/\s+/).filter(Boolean);if(!w.length)return 'ĐT';return w.slice(-2).map(x=>x[0]).join('').toUpperCase();};
const noDia=s=>(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/đ/gi,'d');
const makeUsername=s=>noDia(s).toLowerCase().replace(/[^a-z0-9]/g,'')||('nv'+Math.random().toString(36).slice(2,6));
async function hashPass(s){
  if(!s)return '';
  try{const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('daithien$'+s));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');}
  catch(e){return 'plain:'+s;} // dự phòng nếu trình duyệt cũ không hỗ trợ
}
async function checkPass(input,s){
  if(!s)return false;
  if(s.passHash){return (await hashPass(input))===s.passHash;}
  if(s.pin!=null){return String(input)===String(s.pin);} // tài khoản cũ (PIN) — tương thích ngược
  return false;
}

function closeDlg(){$('#dlg').classList.remove('show');}
function uiPrompt({title,label='',value='',type='text',ok='OK',placeholder=''}){
  return new Promise(res=>{
    $('#dlgContent').innerHTML=`<div class="mbody"><h2 style="font-size:19px;margin-bottom:12px">${esc(title)}</h2>
      ${label?`<label>${esc(label)}</label>`:''}

    $('#dlg').classList.add('show');
    const inp=$('#_dIn');setTimeout(()=>inp.focus(),30);
    const done=v=>{closeDlg();res(v);};
    $('#_dOk').onclick=()=>done(inp.value);
    $('#_dCancel').onclick=()=>done(null);
    inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();done(inp.value);}if(e.key==='Escape')done(null);};
  });
}

/* ====================== LƯU TRỮ (Supabase nếu có cấu hình, ngược lại localStorage) ====================== */
const DB=(()=>{
  let sb=null, useSupa=false;
  const mem={}; let hasLS=false;
  try{localStorage.setItem('__t','1');localStorage.removeItem('__t');hasLS=true;}catch(e){}
  const lsGet=k=>{if(hasLS){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){}}return (k in mem)?mem[k]:null;};
  const lsSet=(k,val)=>{if(hasLS){try{localStorage.setItem(k,JSON.stringify(val));return;}catch(e){}}mem[k]=val;};
  const remote=k=>useSupa&&!LOCAL_KEYS.includes(k);
  return {
    async init(){
      if(SUPA_URL&&SUPA_KEY&&window.supabase&&window.supabase.createClient){
        try{sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);useSupa=true;console.log('✅ Supabase đã kết nối');}
        catch(e){useSupa=false;console.warn('Supabase init lỗi, dùng localStorage:',e);}
      }
    },
    get supaOn(){return useSupa;},
    client(){return sb;},
    async get(k){
      if(remote(k)){
        try{const {data,error}=await sb.from('kv').select('value').eq('key',k).maybeSingle();if(error)throw error;return data?data.value:null;}
        catch(e){console.warn('Supabase get lỗi ('+k+'):',e.message||e);return lsGet(k);}
      }
      return lsGet(k);
    },
    async set(k,val){
      if(remote(k)){
        try{const {error}=await sb.from('kv').upsert({key:k,value:val,updated_at:new Date().toISOString()},{onConflict:'key'});if(error)throw error;lsSet(k,val);return;}
        catch(e){console.warn('Supabase set lỗi ('+k+'):',e.message||e);lsSet(k,val);return;}
      }
      lsSet(k,val);
    },
    /* ----- Xác thực (Supabase Auth) ----- */
    async currentEmail(){if(!useSupa)return null;try{const {data}=await sb.auth.getUser();return data&&data.user?data.user.email:null;}catch(e){return null;}},
    async signIn(email,password){if(!useSupa)return{error:{message:'Chưa kết nối máy chủ'}};return await sb.auth.signInWithPassword({email,password});},
    async signOut(){if(useSupa){try{await sb.auth.signOut();}catch(e){}}},
    async updatePassword(password){if(!useSupa)return{error:{message:'Chưa kết nối'}};return await sb.auth.updateUser({password});},
    // Tạo tài khoản nhân viên KHÔNG làm rớt phiên của chủ (dùng client tạm, không lưu phiên)
    async signUpAux(email,password){
      if(!useSupa)return{error:{message:'Chưa kết nối'}};
      try{const tmp=window.supabase.createClient(SUPA_URL,SUPA_KEY,{auth:{persistSession:false,autoRefreshToken:false,storageKey:'sb-aux'}});
        const r=await tmp.auth.signUp({email,password});return r;}
      catch(e){return{error:{message:e.message||String(e)}};}
    },
    // Tài khoản chủ đầu tiên: signUp trên client chính (để đăng nhập luôn)
    async signUpPrimary(email,password){if(!useSupa)return{error:{message:'Chưa kết nối'}};return await sb.auth.signUp({email,password});}
  };
})();

function renderFirstRun(){
  $('#view').innerHTML=`<div class="login">
    <div class="blogo">${esc(brandMark(settings.shop))}</div>

    <p>Lần đầu thiết lập — tạo tài khoản Chủ cửa hàng (toàn quyền). Dùng email thật của bạn.</p>
    <div class="setrow" style="text-align:left"><label>Họ tên</label><input id="frName" placeholder="VD: Nguyễn Văn A" value="Chủ cửa hàng"></div>
    <div class="setrow" style="text-align:left"><label>Email</label><input id="frEmail" type="email" placeholder="email@gmail.com"></div>
    <div class="setrow" style="text-align:left"><label>Mật khẩu (≥ 6 ký tự)</label><input id="frPass" type="password" placeholder="••••••"></div>

    <p class="hint">Tài khoản này dùng để đăng nhập quản trị về sau.</p>
  </div>`;
  $('#frBtn').onclick=createOwner;
  setTimeout(()=>$('#frEmail').focus(),40);
}
async function doLogin(email,password){
  if(!email||!password){toast('Nhập email và mật khẩu');return;}
  toast('Đang đăng nhập...');
  const {data,error}=await DB.signIn(email,password);
  if(error){toast(/invalid|credential/i.test(error.message)?'Sai email hoặc mật khẩu':('Lỗi: '+error.message));return;}
  await reloadShared();
  const p=staffByEmail(email);
  if(!p||p.active===false){await DB.signOut();toast('Email này chưa được cấp quyền quản trị');return;}
  session.staff=p;tab='';renderTopAct();renderTabs();renderView();toast('Xin chào '+p.name);
}
async function createOwner(){
  const name=($('#frName').value||'Chủ cửa hàng').trim();
  const email=$('#frEmail').value.trim();const pass=$('#frPass').value;
  if(!/.+@.+\..+/.test(email)){toast('Nhập email hợp lệ');return;}
  if(pass.length<6){toast('Mật khẩu tối thiểu 6 ký tự');return;}
  toast('Đang tạo tài khoản...');
  const {data,error}=await DB.signUpPrimary(email,pass);
  if(error){toast('Lỗi tạo tài khoản: '+error.message);return;}
  if(!data||!data.session){toast('Cần TẮT "Confirm email" trong Supabase rồi thử lại (tài khoản chưa kích hoạt được).');return;}
  const owner={id:uid(),email:email.toLowerCase(),name,role:'Chủ',perms:permObj(ROLE_PRESET['Chủ']),active:true};
  staff=[owner];
  await saveStaff();
  session.staff=owner;tab='';renderTopAct();renderTabs();renderView();toast('Đã tạo tài khoản chủ · Xin chào '+name);
}

function stockState(p){
  if(p.stock<=0)return{cls:'no',txt:'Hết hàng',avail:false};
  if(p.stock<=(p.min||0))return{cls:'warn',txt:'Sắp hết',avail:true};
  return{cls:'ok',txt:'Còn hàng',avail:true};
}
function zaloLink(){const z=(settings.zalo||'').trim();if(z)return /^https?:/i.test(z)?z:'https://zalo.me/'+z.replace(/[^\d]/g,'');const ph=(settings.phone||'').replace(/[^\d]/g,'');return ph?'https://zalo.me/'+ph:'#';}
const telLink=()=>'tel:'+(settings.phone||'').replace(/[^\s\d+]/g,'');
function mapQuery(){return ((settings.map&&settings.map.trim())||((settings.shop||'')+' '+(settings.address||''))).trim();}
function mapEmbed(){return 'https://maps.google.com/maps?q='+encodeURIComponent(mapQuery())+'&z=16&hl=vi&output=embed';}
function mapDir(){return 'https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(mapQuery());}

function catCounts(){const c={__all:products.length,__none:0};cats.forEach(x=>c[x]=0);
  products.forEach(p=>{if(p.cat&&cats.includes(p.cat))c[p.cat]=(c[p.cat]||0)+1;else c.__none++;});return c;}
function shopFiltered(){let l=products.slice();
  if(active==='__none')l=l.filter(p=>!p.cat||!cats.includes(p.cat));
  else if(active!=='__all')l=l.filter(p=>p.cat===active);
  if(search){const s=search.toLowerCase();l=l.filter(p=>(p.name||'').toLowerCase().includes(s)||(p.sku||'').toLowerCase().includes(s));}
  return l;}

const EMOJI2ICON={'🚚':'truck','🔄':'refresh','🛡️':'shield','✏️':'pencil','📞':'phone','☎':'phone','🔍':'search','🔎':'search','🛒':'bag','🛍':'bag','📍':'pin','✉':'mail','💬':'chat','⚡':'tag','🔥':'flame','✨':'spark','🛋️':'sofa','🛏️':'bed','🍽️':'dining','📚':'book','💼':'office','🗄️':'cabinet','🍳':'kitchen','🪑':'chair','🔐':'lock','🛌':'bed','🕐':'clock','⏰':'clock'};
function renderIcon(v,size){if(ICONS[v])return svgIcon(v,size);if(EMOJI2ICON[v])return svgIcon(EMOJI2ICON[v],size);return esc(v||'');} // tên icon hoặc emoji -> svg, ngược lại giữ chữ
function catIconName(c){const k=(c||'').toLowerCase();
  if(/sofa|khách|phòng khách/.test(k))return 'sofa';if(/ngủ|giường|tủ quần/.test(k))return 'bed';
  if(/bàn ăn|phòng ăn|ăn/.test(k))return 'dining';if(/học/.test(k))return 'book';
  if(/văn phòng|làm việc/.test(k))return 'office';if(/bếp/.test(k))return 'kitchen';
  if(/nệm/.test(k))return 'bed';if(/tủ|kệ/.test(k))return 'cabinet';return 'chair';}
function catIcon(c,size){return svgIcon(catIconName(c),size||30,1.5);}
function soldMap(){const m={};vouchers.filter(v=>v.type==='ban').forEach(v=>v.items.forEach(i=>{m[i.id]=(m[i.id]||0)+i.qty;}));return m;}

function priceHTML(p){
  if(!settings.showPrice)return `<span class="now nodeal" style="font-size:15px;color:var(--muted)">Liên hệ báo giá</span>`;
  const hasSale=p.salePrice&&p.salePrice<p.price;
  return `<span class="now ${hasSale?'':'nodeal'}">${fmt(sellPrice(p))}</span>${hasSale?`<span class="old">${fmt(p.price)}</span>`:''}`;
}
function shopCard(p){
  const st=stockState(p);const img=p.images&&p.images[0];
  const hasSale=p.salePrice&&p.salePrice<p.price&&settings.showPrice;
  const pct=hasSale?Math.round((1-p.salePrice/p.price)*100):0;
  const sold=(window._sold&&window._sold[p.id])||0;
  return `<div class="pcard" data-id="${p.id}">
    <div class="thumb" data-detail>${img?`<img src="${esc(img)}" alt="${esc(p.name)}">`:catIcon(p.cat,52)}
      ${hasSale?`<span class="disc">-${pct}%</span>`:''}${!st.avail?'<span class="soldout">Hết hàng</span>':''}
      <div class="hoverbtns">
        <button class="hb" data-quick>${svgIcon('eye',15)} Xem nhanh</button>
        <button class="hb" data-detail2>Xem chi tiết</button>
      </div></div>
    <div class="pbody">
      <div class="pcat">${esc(p.cat||'Nội thất')}</div>
      <div class="pname" data-detail>${esc(p.name)}</div>
      <div class="pprice">${priceHTML(p)}</div>
      <div class="psold">${sold?'Đã bán '+sold:(st.avail?'Còn hàng':'')}</div>
      <button class="buy" ${st.avail?'data-add':'disabled'}>${st.avail?'Mua ngay':'Hết hàng'}</button>
    </div></div>`;
}
function heroInner(h,opts){
  opts=opts||{};const hasImg=!!h.image;
  // Để trống = ẩn (banner thiết kế sẵn). Khi KHÔNG có ảnh thì mới điền mặc định cho đỡ trống.
  const eyebrow=h.eyebrow||(hasImg?'':settings.shop);
  const title=h.title||(hasImg?'':(settings.slogan||'Nội thất bền đẹp cho tổ ấm của bạn'));
  const desc=h.desc||(hasImg?'':'Sản phẩm chính hãng · giao lắp tận nơi · bảo hành dài hạn.');
  const btn=(h.btn==null?'Khám phá sản phẩm':h.btn);
  const exploreBtn = !btn ? '' : (opts.preview?`<span class="hbtn">${esc(btn)} →</span>`:`<button class="hbtn" id="heroShop">${esc(btn)} →</button>`);
  const phoneBtn = (btn&&settings.phone) ? (opts.preview?`<span class="hbtn ghost">${svgIcon('phone',13)} ${esc(settings.phone)}</span>`:`<a class="hbtn ghost" href="${telLink()}">${svgIcon('phone',15)} ${esc(settings.phone)}</a>`) : '';
  return `${eyebrow?`<div class="eyebrow">${esc(eyebrow)}</div>`:''}
    ${title?`<h1>${esc(title)}</h1>`:''}
    ${desc?`<p>${esc(desc)}</p>`:''}
    ${(exploreBtn||phoneBtn)?`<div class="hbtns">${exploreBtn}${phoneBtn}</div>`:''}`;
}
function heroBgHTML(h){
  if(!h.image)return '';
  const z=(h.imgZoom||100)/100;
  return `<img class="hero-bg" src="${esc(h.image)}" alt="" style="object-position:${esc(h.imgPos||'50% 50%')};transform:scale(${z})">`;
}
function heroHasText(h){return h.image?!!(h.eyebrow||h.title||h.desc||h.btn):true;}
function heroPicture(h){ // ảnh đầy đủ; có ảnh mobile riêng thì dùng <picture>
  if(h.imageMobile)return `<picture><source media="(max-width:560px)" srcset="${esc(h.imageMobile)}"><img src="${esc(h.image)}" alt="${esc(settings.shop||'')}"></picture>`;
  return `<img src="${esc(h.image)}" alt="${esc(settings.shop||'')}">`;
}
function heroHTML(){
  const h=settings.hero||{};
  // Banner thiết kế sẵn (có ảnh, không chữ đè) -> hiện ĐẦY ĐỦ, không cắt
  if(h.image&&!heroHasText(h))return `<section class="herofull">${heroPicture(h)}</section>`;
  const cls=`hero${h.image?' has-img':''}${heroHasText(h)?' has-text':''} v-${h.valign||'bottom'} h-${h.halign||'left'}`;

function trustHTML(){

function renderShop(){
  applySEO(null);
  const c=catCounts();const sold=window._sold=soldMap();
  const homepage=(active==='__all'&&!search);

  if(homepage){
    html+=heroHTML()+trustHTML();

    const deals=products.filter(p=>p.salePrice&&p.salePrice<p.price).slice(0,8);
    const best=[...products].filter(p=>sold[p.id]).sort((a,b)=>sold[b.id]-sold[a.id]).slice(0,8);
    if(deals.length)html+=secHTML('tag','Giá siêu tốt',deals);

    <div class="sechead"><h2><span class="bar"></span>${active==='__all'?'Tất cả sản phẩm':active==='__none'?'Chưa phân loại':esc(active)}</h2>
      <span class="muted">${list.length} sản phẩm</span></div>

  $('#view').querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{active=b.dataset.cat;renderShop();window.scrollTo({top:0,behavior:'smooth'});});

  const hb=$('#heroShop');if(hb)hb.onclick=()=>{const sb=$('#q');if(sb){sb.scrollIntoView({behavior:'smooth',block:'center'});sb.focus();}};
  bindShopCards();
}
function bindShopCards(){
  $('#view').querySelectorAll('.pcard').forEach(card=>{const id=card.dataset.id;
    card.querySelectorAll('[data-detail],[data-detail2]').forEach(el=>el.onclick=e=>{e.stopPropagation();goProduct(id);});
    const q=card.querySelector('[data-quick]');if(q)q.onclick=e=>{e.stopPropagation();openDetail(id);};
    const add=card.querySelector('[data-add]');if(add)add.onclick=()=>{addToCart(id,1);openCart();};});
}
function prodColors(p){return (p.color||'').split(/\s*[\/,;|·\n]\s*/).map(s=>s.trim()).filter(Boolean);}
function prodSizes(p){return (p.sizeOpts||'').split(/\s*[\/,;|·\n]\s*/).map(s=>s.trim()).filter(Boolean);}
function getVariant(id){const p=prod(id);if(!p)return{color:'',size:''};
  const cs=prodColors(p),ss=prodSizes(p);
  let v=cartVariant[id];if(typeof v==='string')v={color:v};v=v||{};
  return {color: cs.includes(v.color)?v.color:(cs[0]||''), size: ss.includes(v.size)?v.size:(ss[0]||'')};}
function setVariant(id,patch){const v=getVariant(id);cartVariant[id]=Object.assign({},v,patch);saveCartVar();}
function variantStr(id){const v=getVariant(id);return [v.color,v.size].filter(Boolean).join(' · ');}

  cartVariant[id]={color:v.color,size:v.size};
  const colIdx=Math.max(0,colors.indexOf(v.color));
  const mainImg=imgs.length?(imgs[colIdx]||imgs[0]):'';
  const specs=[['Mã SP',p.sku],['Danh mục',p.cat],['Chất liệu',p.material],['Kích thước',p.size]].filter(r=>r[1]);
  return `<div class="detail">
    <div class="dgal">
      <div class="dmain" id="dMain">${mainImg?`<img src="${esc(mainImg)}" alt="${esc(p.name)}">`:`<span style="color:#C3B4A2;display:flex">${catIcon(p.cat,90)}</span>`}</div>
      ${imgs.length>1?`<div class="dthumbs" id="dThumbs">${imgs.map((im,i)=>`<button class="dthumb${i===colIdx?' on':''}" data-i="${i}"><img src="${esc(im)}"></button>`).join('')}</div>`:''}
    </div>
    <div class="dinfo">
      <div class="pcat">${esc(p.cat||'Nội thất')}</div>
      <h2 style="font-size:24px;margin:5px 0 6px;line-height:1.2">${esc(p.name)}</h2>
      ${mode==='page'?`<div class="muted" style="font-size:12.5px;margin-bottom:10px">${p.sku?'Mã: <b>'+esc(p.sku)+'</b>':''}${(window._sold&&window._sold[id])?(p.sku?' · ':'')+'Đã bán '+window._sold[id]:''}</div>`:''}
      <div class="pprice" style="font-size:26px;margin:0 0 14px">${priceHTML(p)}</div>
      ${(p.desc&&mode==='page')?`<p class="muted" style="margin:0 0 16px;line-height:1.7">${esc(p.desc)}</p>`:(p.desc?`<p class="muted" style="margin:0 0 16px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">${esc(p.desc)}</p>`:'')}
      ${colors.length?`<div class="vargroup"><label>Màu sắc: <b id="dColorName" style="color:var(--ink)">${esc(v.color)}</b></label>
        <div class="swatches" id="dSw">${colors.map((c,i)=>`<button class="sw${i===colIdx?' on':''}" data-c="${esc(c)}" data-i="${i}" title="${esc(c)}">${imgs[i]?`<img src="${esc(imgs[i])}">`:`<span class="swdot">${esc(c.slice(0,2))}</span>`}</button>`).join('')}</div></div>`:''}
      ${sizes.length?`<div class="vargroup"><label>Kích thước: <b id="dSizeName" style="color:var(--ink)">${esc(v.size)}</b></label>

      <table class="dspec">${specs.map(([k,vv])=>`<tr><td class="muted">${esc(k)}</td><td class="right" style="font-weight:600">${esc(vv)}</td></tr>`).join('')}</table>
      ${mode==='page'?`
      <div class="qtyrow"><span class="muted" style="font-size:13px">Số lượng</span><div class="qty"><button id="qMinus">−</button><span id="qVal">1</span><button id="qPlus">+</button></div></div>

        ${st.avail?`<button class="btn alt" id="dAdd" style="flex:1">${svgIcon('bag',16)} Thêm vào giỏ</button><button class="btn" id="dBuy" style="flex:1">Mua ngay</button>`:`<button class="btn alt" disabled style="flex:1">Hết hàng</button>`}

        <li>${svgIcon('pin',16)} Có showroom: ${esc(settings.address||'Hải Phòng')}</li>
      </ul>`
      :`<div class="row" style="margin-top:18px">
        ${st.avail?`<button class="btn" id="dAdd" style="flex:2">${svgIcon('bag',16)} Thêm vào giỏ</button>`:`<button class="btn alt" disabled style="flex:2">Hết hàng</button>`}

function bindProductView(p){
  const id=p.id,imgs=(p.images&&p.images.length)?p.images:[];
  const setMain=i=>{const m=$('#dMain');if(m&&imgs[i])m.innerHTML=`<img src="${esc(imgs[i])}" alt="${esc(p.name)}">`;
    const th=$('#dThumbs');if(th)th.querySelectorAll('.dthumb').forEach(x=>x.classList.toggle('on',+x.dataset.i===i));};
  const th=$('#dThumbs');if(th)th.querySelectorAll('.dthumb').forEach(b=>b.onclick=()=>setMain(+b.dataset.i));
  const sw=$('#dSw');if(sw)sw.querySelectorAll('.sw').forEach(b=>b.onclick=()=>{
    setVariant(id,{color:b.dataset.c});$('#dColorName').textContent=b.dataset.c;
    sw.querySelectorAll('.sw').forEach(x=>x.classList.toggle('on',x===b));if(imgs[+b.dataset.i])setMain(+b.dataset.i);});
  const sz=$('#dSize');if(sz)sz.querySelectorAll('.varchip').forEach(b=>b.onclick=()=>{
    setVariant(id,{size:b.dataset.s});$('#dSizeName').textContent=b.dataset.s;
    sz.querySelectorAll('.varchip').forEach(x=>x.classList.toggle('on',x===b));});
}

const inCart=()=>Object.keys(cart).filter(id=>cart[id]>0&&prod(id));
const cartCount=()=>inCart().reduce((a,id)=>a+cart[id],0);
function updateCart(){const n=cartCount();const el=$('#cartCount');if(el){el.textContent=n;el.style.display=n?'inline-flex':'none';}}
async function addToCart(id,q=1){const p=prod(id);if(!p)return;cart[id]=(cart[id]||0)+q;if(cart[id]<1)delete cart[id];await saveCart();updateCart();toast('Đã thêm · '+p.name);}
async function setQty(id,q){if(q<=0)delete cart[id];else cart[id]=q;await saveCart();updateCart();openCart();}
function openCart(){
  const ids=inCart();const total=ids.reduce((s,id)=>s+sellPrice(prod(id))*cart[id],0);
  $('#ovContent').innerHTML=`<div class="mbody">
    <h2 style="margin-bottom:12px;display:flex;align-items:center;gap:9px">${svgIcon('bag',20)} Giỏ hàng${ids.length?' ('+cartCount()+')':''}</h2>

        <div class="cthumb">${im?`<img src="${esc(im)}">`:`<span style="color:#C3B4A2;display:flex">${catIcon(p.cat,22)}</span>`}</div>
        <div style="flex:1;min-width:0"><div style="font-weight:600">${esc(p.name)}</div><div class="muted" style="font-size:11.5px">${fmt(sellPrice(p))}${p.unit?' / '+esc(p.unit):''}${variantStr(id)?' · '+esc(variantStr(id)):''}</div></div>

function buildOrderText(o){

  if(o.buyer.note)t+='📝 '+o.buyer.note+'\n';

  const revToday=ban.filter(v=>new Date(v.date).toDateString()===today).reduce((s,v)=>s+v.total,0);
  const revMonth=ban.filter(v=>{const d=new Date(v.date);return d.getFullYear()+'-'+d.getMonth()===ym;}).reduce((s,v)=>s+v.total,0);
  const profitMonth=ban.filter(v=>{const d=new Date(v.date);return d.getFullYear()+'-'+d.getMonth()===ym;})
    .reduce((s,v)=>s+v.items.reduce((a,i)=>a+(i.price-(i.cost||0))*i.qty,0),0);
  const stockVal=products.reduce((s,p)=>s+p.stock*p.cost,0);

function qrSvg(text){try{const q=qrcode(0,'M');q.addData(text);q.make();return q.createSvgTag({cellSize:3,margin:0});}catch(e){return '';}}
function printTags(ids){
  const tags=ids.map(id=>{const p=prod(id);const hasSale=p.salePrice&&p.salePrice<p.price;
    return `<div style="border:1px solid #333;border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:12px;page-break-inside:avoid">
      <div><div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#888">${esc(settings.shop)}</div>
      <div style="font-family:'Montserrat',sans-serif;font-weight:700;font-size:17px;margin:3px 0">${esc(p.name)}</div>
      <div style="font-size:11px;color:#666">Mã: ${esc(p.sku||'—')}${p.size?' · '+esc(p.size):''}</div>
      <div style="margin-top:6px"><span style="font-size:20px;font-weight:800;color:#B5531A">${fmt(sellPrice(p))}</span>${hasSale?` <span style="text-decoration:line-through;color:#999;font-size:13px">${fmt(p.price)}</span>`:''}</div></div>
      <div style="width:74px;height:74px;flex:none">${qrSvg('SP:'+(p.sku||p.id)+'|'+p.name)}</div>
    </div>`;}).join('');
  $('#printArea').innerHTML=`<div class="tags" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px">${tags}</div>`;
  window.print();
}

const POSCELLS=[['top','left'],['top','center'],['top','right'],['center','left'],['center','center'],['center','right'],['bottom','left'],['bottom','center'],['bottom','right']];
function gdPreview(){
  const gh=window._gh;const el=$('#gdPrev');if(!el)return;
  if(gh.image&&!heroHasText(gh)){el.className='herofull';el.style.minHeight='';el.innerHTML=heroPicture(gh);return;}
  el.style.minHeight='';
  el.className=`hero gdmini${gh.image?' has-img':''}${heroHasText(gh)?' has-text':''} v-${gh.valign||'bottom'} h-${gh.halign||'left'}`;
  el.innerHTML=heroBgHTML(gh)+`<div class="hero-inner">${heroInner(gh,{preview:true})}</div>`;
  bindGdDrag();
}
function bindGdDrag(){
  const el=$('#gdPrev');if(!el)return;const img=el.querySelector('.hero-bg');if(!img)return;
  let drag=false,sx,sy,px,py;
  const cur=()=>{const p=(window._gh.imgPos||'50% 50%').split(' ').map(parseFloat);return{x:isNaN(p[0])?50:p[0],y:isNaN(p[1])?50:p[1]};};
  img.onpointerdown=e=>{drag=true;el.style.cursor='grabbing';sx=e.clientX;sy=e.clientY;const c=cur();px=c.x;py=c.y;try{img.setPointerCapture(e.pointerId);}catch(_){}e.preventDefault();};
  img.onpointermove=e=>{if(!drag)return;const dx=e.clientX-sx,dy=e.clientY-sy;
    const nx=Math.min(100,Math.max(0,px-dx/el.clientWidth*100)), ny=Math.min(100,Math.max(0,py-dy/el.clientHeight*100));
    window._gh.imgPos=Math.round(nx)+'% '+Math.round(ny)+'%';img.style.objectPosition=window._gh.imgPos;};
  const stop=()=>{drag=false;el.style.cursor='grab';};img.onpointerup=stop;img.onpointercancel=stop;
}

  $('#roletabs').querySelectorAll('.roletab').forEach(b=>b.onclick=()=>{
    role=b.dataset.r;$('#roletabs').querySelectorAll('.roletab').forEach(x=>x.classList.toggle('on',x===b));
    const preset=ROLE_PRESET[role];$('#permgrid').querySelectorAll('[data-p]').forEach(c=>c.checked=preset.includes(c.dataset.p));
  });
  $('#sCancel').onclick=closeOv;
  $('#sSave').onclick=async()=>{
    const name=$('#sName').value.trim();
    if(!name){toast('Nhập họ tên');return;}
    const perms={};$('#permgrid').querySelectorAll('[data-p]').forEach(c=>perms[c.dataset.p]=c.checked);
    if(id){
      const t=staff.find(x=>x.id===id);Object.assign(t,{name,role,active:$('#sActive').value==='1',perms});
      await saveStaff();closeOv();toast('Đã lưu nhân viên');renderNhanvien();
      if(session.staff&&id===session.staff.id){session.staff=t;renderTabs();renderView();}
    }else{
      const email=$('#sEmail').value.trim().toLowerCase();const pass=$('#sPass').value;
      if(!/.+@.+\..+/.test(email)){toast('Nhập email hợp lệ');return;}
      if(staff.some(x=>x.email&&x.email.toLowerCase()===email)){toast('Email này đã có nhân viên');return;}
      if(pass.length<6){toast('Mật khẩu tối thiểu 6 ký tự');return;}
      toast('Đang tạo tài khoản...');
      const {error}=await DB.signUpAux(email,pass);
      if(error){toast('Lỗi: '+(/registered|exist/i.test(error.message)?'Email đã được đăng ký':error.message));return;}
      staff.push({id:uid(),email,name,role,active:$('#sActive').value==='1',perms});
      await saveStaff();closeOv();toast('Đã thêm nhân viên');renderNhanvien();
    }
  };
}

/* ====================== SAO LƯU / KHÔI PHỤC ====================== */
function backup(){const data={products,cats,vouchers,orders,staff,settings};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='dai-thien-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);toast('Đã tải file sao lưu');}
$('#fileIn').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=async()=>{try{const d=JSON.parse(r.result);
    if(d.products){products=d.products;cats=d.cats||cats;vouchers=d.vouchers||[];orders=d.orders||[];staff=d.staff||staff;settings=Object.assign({},DEFSET,d.settings||settings);
      await saveP();await saveCats();await saveV();await saveO();await saveStaff();await saveSet();
      toast('Đã khôi phục dữ liệu');renderBrand();renderView();}else toast('File không hợp lệ');
  }catch(_){toast('Không đọc được file');}};r.readAsText(f);e.target.value='';};

/* ====================== UPLOAD ẢNH ====================== */
function resizeImg(file,max,cb){const img=new Image();const url=URL.createObjectURL(file);
  img.onload=()=>{let w=img.width,h=img.height;if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);cb(c.toDataURL('image/jpeg',0.82));};img.src=url;}
$('#fileGallery').onchange=e=>{const files=[...e.target.files];if(!files.length)return;window._kImgs=window._kImgs||[];
  let done=0;files.forEach(f=>resizeImg(f,1000,d=>{window._kImgs.push(d);if(++done===files.length)renderKGallery();}));e.target.value='';};
$('#fileBanner').onchange=e=>{const f=e.target.files[0];if(!f)return;resizeImg(f,1600,d=>{
  window._gh=window._gh||JSON.parse(JSON.stringify(settings.hero));
  window._gh.image=d;window._gh.imgPos='50% 50%';window._gh.imgZoom=100;
  const zr=$('#zoomRow');if(zr)zr.style.display='block';const bd=$('#bDel');if(bd)bd.style.display='block';
  const gz=$('#gZoom');if(gz)gz.value=100;const zv=$('#zoomVal');if(zv)zv.textContent='100%';
  gdPreview();toast('Đã tải ảnh — kéo để chỉnh vị trí rồi bấm Lưu');});e.target.value='';};
$('#fileBannerM').onchange=e=>{const f=e.target.files[0];if(!f)return;resizeImg(f,1200,d=>{
  window._gh=window._gh||JSON.parse(JSON.stringify(settings.hero));window._gh.imageMobile=d;
  const bdm=$('#bDelM');if(bdm)bdm.style.display='block';gdPreview();toast('Đã tải ảnh điện thoại — bấm Lưu');});e.target.value='';};
$('#fileLogo').onchange=e=>{const f=e.target.files[0];if(!f)return;resizeImg(f,600,async d=>{settings.logo=d;await saveSet();renderBrand();const lp=$('#logoPrev');if(lp)lp.innerHTML=`<img src="${d}">`;const ld=$('#logoDel');if(ld)ld.style.display='block';toast('Đã cập nhật logo');});e.target.value='';};
